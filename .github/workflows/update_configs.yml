name: Ghost Collector Update

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '*/30 * * * *'
  # Возможность запустить процесс вручную через вкладку Actions
  workflow_dispatch: 

# Разрешения, необходимые боту для пуша изменений в репозиторий
permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      # 1. Загрузка кода репозитория в виртуальную машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка нужной версии Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Включаем кэширование pip для ускорения следующих запусков

      # 3. Установка зависимостей из requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Запуск основного скрипта (с передачей секретов из GitHub)
      - name: Run Collector and Validator
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python main.py

      # 5. Сохранение результатов и отправка их в репозиторий
      - name: Commit and Push changes
        run: |
          # Настраиваем профиль бота для коммита
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем файлы, которые скрипт должен был обновить
          git add data/final_configs.json README.md
          
          # Проверяем, есть ли вообще изменения. Если файлов нет в git diff, коммит пропускается без ошибки
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Ghost_WhiteList configs" && git push)
